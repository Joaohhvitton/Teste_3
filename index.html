<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Atendimentos N3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="logo-divider">
            <img src="Logo_png-removebg-preview.png" alt="RedeFlex" class="brand-logo" />
          </div>
          <div class="title-wrap">
            <h1>PAINEL DE ATENDIMENTOS N3</h1>
            <p>Acompanhamento semanal de demandas operacionais</p>
          </div>
        </div>

        <div class="topbar-right">
          <div class="icon-actions divider-right" aria-label="Ações rápidas">
            <button class="icon-btn" id="notifications-btn" type="button" aria-label="Notificações">
              <span class="badge" id="notifications-count">0</span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M14.5 18h-5m8-6v-1a5.5 5.5 0 1 0-11 0v1c0 2-.9 3.4-2 4h15c-1.1-.6-2-2-2-4Z" />
              </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="Pesquisar">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="6" />
                <path d="m20 20-4.2-4.2" />
              </svg>
            </button>
          </div>

          <div class="user-area">
            <img src="Logo_OPCOM-removebg-preview.png" alt="Lucas" class="avatar" />
          </div>
        </div>
      </header>

      <section class="controls-row">
        <article class="summary-card">
          <p>ATENDIMENTOS</p>
          <h2 id="total-atendimentos">0</h2>
          <span>Nesta Semana</span>
        </article>

        <button class="create-btn" id="create-record" type="button">+ Criar registro</button>

        <article class="week-card">
          <div class="week-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4M16 3v4M4 10h16"></path>
            </svg>
          </div>
          <div class="week-content">
            <p>Semana de</p>
            <strong id="week-range">10/03/2026 - 14/03/2026</strong>
          </div>
          <div class="week-nav">
            <button type="button" id="prev-week" aria-label="Semana anterior">‹</button>
            <button type="button" id="next-week" aria-label="Próxima semana">›</button>
          </div>
        </article>
      </section>

      <section class="board" id="board"></section>
    </main>

    <section class="welcome-popup" id="welcome-popup" aria-hidden="true">
      <div class="welcome-popup-card">
        <h2>Boas vindas 👋</h2>
        <p>Bem-vindo ao Painel de Atendimentos N3.</p>
      </div>
    </section>

    <section class="modal" id="record-modal" aria-hidden="true">
      <form class="modal-card" id="record-form">
        <h3>Novo registro (teste)</h3>

        <label>Incidente <input id="incident-input" required /></label>
        <label>Documento <input id="document-input" required /></label>
        <label>Sistema <input id="system-input" required /></label>
        <label>
          Dia (automático)
          <input id="day-display" readonly />
          <input id="day-select" type="hidden" />
        </label>

        <div class="modal-actions">
          <button type="button" id="cancel-record">Cancelar</button>
          <button type="submit">Salvar</button>
        </div>
      </form>
    </section>

    <section class="modal" id="day-records-modal" aria-hidden="true">
      <div class="modal-card modal-card-wide">
        <h3 id="day-records-title">Registros do dia</h3>
        <div id="day-records-list" class="day-records-list"></div>
        <div class="modal-actions">
          <button type="button" id="close-day-records">Fechar</button>
        </div>
      </div>
    </section>

    <section class="modal" id="notifications-modal" aria-hidden="true">
      <div class="modal-card modal-card-wide">
        <h3>Notificações de novas demandas</h3>
        <div id="notifications-list" class="day-records-list"></div>
        <div class="modal-actions">
          <button type="button" id="close-notifications">Fechar</button>
        </div>
      </div>
    </section>

    <template id="day-template">
      <article class="day-column">
        <header class="day-header">
          <h3></h3>
          <span></span>
        </header>
        <div class="entries"></div>
        <button class="expand-day-btn" type="button" hidden>Ver todos</button>
      </article>
    </template>

    <template id="entry-template">
      <div class="entry-card">
        <h4></h4>
        <p></p>
        <small></small>
        <button class="add-document-btn" type="button">+ Documento</button>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
